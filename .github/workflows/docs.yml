name: docs

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Prepare docs directory
        run: |
          mkdir -p docs
          # Copy everything to docs/ to satisfy relative links (LICENSE, etc.)
          cp -r . docs/ || true
          # Clean up to avoid infinite recursion and unwanted files
          rm -rf docs/docs docs/site docs/.git docs/.github
          # Update internal links from README.md to index.md before renaming the files
          find docs -name "*.md" -exec sed -i 's/README\.md/index.md/g' {} +
          # Recursively rename README.md to index.md to satisfy MkDocs directory links
          find docs -name "README.md" -execdir mv README.md index.md \;

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
